services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PUERTO: "8080"
      DB_DRIVER: postgres
      DB_DSN: host=db user=detalles password=detalles dbname=detalles_personalizados port=5432 sslmode=disable
      JWT_SECRETO: ${JWT_SECRETO:-cambia_este_secreto_en_docker}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: detalles
      POSTGRES_PASSWORD: detalles
      POSTGRES_DB: detalles_personalizados
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U detalles -d detalles_personalizados"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
